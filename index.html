<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baseball Cards Inventory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Left Sidebar -->
    <div class="sidebar">
      <div class="logo top-logo">
        <img src="./images/spoonLabs__cool.png" alt="Top Logo">
      </div>
      <nav class="links">

      <div class="logo bottom-logo">
        <img src="./images/spoonLabsHeader.png" alt="Bottom Logo">
      </div>
    </div>

    <!-- Main Content -->
    <div class="inventory">
      <h1>For Sale or Trade</h1>
      <div id="cards" class="cards-container">
        <!-- Cards will be dynamically inserted here -->
      </div>
    </div>
  </div>
  <script src="script.js"></script>

</html>
