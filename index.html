<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baseball Cards Inventory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Left Sidebar -->
    <div class="sidebar">
      <div class="logo top-logo">
        <img src="logo-top.png" alt="Top Logo">
      </div>
      <nav class="links">
        <a href="https://ebay.com" target="_blank">eBay</a>
        <a href="https://instagram.com" target="_blank">Instagram</a>
        <a href="https://tiktok.com" target="_blank">TikTok</a>
        <a href="mailto:your-email@example.com">Email</a>
      </nav>
      <div class="logo bottom-logo">
        <img src="logo-bottom.png" alt="Bottom Logo">
      </div>
    </div>

    <!-- Main Content -->
    <div class="inventory">
      <h1>Current Inventory</h1>
      <div id="cards" class="cards-container">
        <!-- Cards will be dynamically inserted here -->
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
